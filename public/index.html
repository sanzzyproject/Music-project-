<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamify - Modern Web Music</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Streamify</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Cari lagu atau artis...">
                <button onclick="searchMusic()">Cari</button>
            </div>
        </header>

        <main>
            <div id="loading" class="hidden">Mencari lagu...</div>
            <div id="resultsGrid" class="grid">
                </div>
        </main>
    </div>

    <div class="player">
        <div class="player-info">
            <img id="playerImage" src="https://via.placeholder.com/50" alt="Cover">
            <div>
                <h4 id="playerTitle">Belum ada lagu</h4>
                <p id="playerArtist">-</p>
            </div>
        </div>
        <div class="player-controls">
            <button onclick="togglePlay()" id="playBtn">▶ Play</button>
        </div>
    </div>

    <div id="youtube-player" style="display: none;"></div>

    <script src="/script.js"></script>
</body>
</html>
