<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeMusic - AI Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="flex h-screen">
        <nav class="w-64 bg-black p-6 hidden md:block">
            <h1 class="text-2xl font-bold text-red-600 mb-8">VibeMusic</h1>
            <ul class="space-y-4">
                <li class="hover:text-red-500 cursor-pointer">Home</li>
                <li class="hover:text-red-500 cursor-pointer">Explore</li>
                <li class="hover:text-red-500 cursor-pointer">Library</li>
            </ul>
        </nav>

        <main class="flex-1 p-8 overflow-y-auto pb-32">
            <div class="flex gap-4 mb-8">
                <input id="searchInput" type="text" placeholder="Cari lagu, artis..." 
                       class="w-full max-w-md bg-zinc-800 border-none rounded-full px-6 py-2 focus:ring-2 focus:ring-red-600">
                <button onclick="searchMusic()" class="bg-red-600 px-6 py-2 rounded-full font-medium">Search</button>
            </div>

            <div id="results" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                </div>
        </main>
    </div>

    <div class="fixed bottom-0 w-full bg-zinc-900/90 backdrop-blur-lg border-t border-zinc-800 p-4">
        <div class="max-w-screen-xl mx-auto flex items-center justify-between">
            <div id="currentTrack" class="flex items-center gap-4 w-1/3">
                <div class="w-12 h-12 bg-zinc-800 rounded shadow-lg" id="trackArt"></div>
                <div>
                    <p class="font-bold text-sm" id="trackTitle">No Song Selected</p>
                    <p class="text-xs text-zinc-400" id="trackArtist">-</p>
                </div>
            </div>
            <audio id="audioPlayer" controls class="w-1/3 h-8"></audio>
            <div class="w-1/3 text-right text-xs text-zinc-500">Powered by ytmusicapi</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
